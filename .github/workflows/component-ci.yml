name: component-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  component:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            runs_on: ubuntu-latest
            openvino_ubuntu_packages: >-
              build-essential
              ninja-build
              ccache
              pkgconf
              git
              libtbb-dev
              libpugixml-dev
              patchelf
              libsnappy-dev
              python3-pip
              python3-venv
              python3-setuptools
              libpython3-dev
              pybind11-dev
              libffi-dev
              libvulkan-dev
            openvino_cmake_args: >-
              -DENABLE_PYTHON=OFF
              -DENABLE_JS=OFF
              -DENABLE_SAMPLES=OFF
              -DENABLE_TESTS=OFF
              -DENABLE_OV_ONNX_FRONTEND=OFF
              -DENABLE_OV_PADDLE_FRONTEND=OFF
              -DENABLE_OV_TF_FRONTEND=OFF
              -DENABLE_OV_TF_LITE_FRONTEND=OFF
            build_command: python3 ci/build_standalone.py
          - name: macos
            runs_on: macos-14
            openvino_ubuntu_packages: ""
            openvino_cmake_args: >-
              -DENABLE_PYTHON=OFF
              -DENABLE_JS=OFF
              -DENABLE_SAMPLES=OFF
              -DENABLE_TESTS=OFF
              -DENABLE_OV_ONNX_FRONTEND=OFF
              -DENABLE_OV_PADDLE_FRONTEND=OFF
              -DENABLE_OV_TF_FRONTEND=OFF
              -DENABLE_OV_TF_LITE_FRONTEND=OFF
            build_command: python3 ci/build_standalone.py
          - name: android-arm64
            runs_on: ubuntu-latest
            android_ndk_version: 27.2.12479018
            openvino_ubuntu_packages: >-
              build-essential
              ninja-build
              ccache
              pkgconf
              git
              libpython3-dev
              python3-pip
              python3-venv
              python3-setuptools
              unzip
            openvino_cmake_args: >-
              -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK_ROOT}/build/cmake/android.toolchain.cmake
              -DANDROID_ABI=arm64-v8a
              -DANDROID_PLATFORM=android-24
              -DANDROID_STL=c++_shared
              -DENABLE_PYTHON=OFF
              -DENABLE_JS=OFF
              -DENABLE_SAMPLES=OFF
              -DENABLE_TESTS=OFF
              -DENABLE_OV_ONNX_FRONTEND=OFF
              -DENABLE_OV_PADDLE_FRONTEND=OFF
              -DENABLE_OV_TF_FRONTEND=OFF
              -DENABLE_OV_TF_LITE_FRONTEND=OFF
            build_command: >-
              python3 ci/build_standalone.py
              --target-platform android
              --android-abi arm64-v8a
              --android-platform android-24
              --android-stl c++_shared
    uses: ovx-labs/ov-ci/.github/workflows/reusable-component-ci.yml@main
    with:
      component: ov-gfx-plugin
      runs-on: ${{ matrix.runs_on }}
      openvino-repo: ovx-labs/openvino
      openvino-ref: master
      openvino-submodules: recursive
      android-ndk-version: ${{ matrix.android_ndk_version || '' }}
      openvino-ubuntu-packages: ${{ matrix.openvino_ubuntu_packages }}
      openvino-cmake-args: ${{ matrix.openvino_cmake_args }}
      submodules: recursive
      validation-command: python3 ci/validate_repo.py
      build-command: ${{ matrix.build_command }}
      test-command: python3 ci/validate_artifacts.py
