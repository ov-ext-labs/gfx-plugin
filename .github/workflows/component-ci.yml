name: component-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ov-gfx-plugin-component-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve-config:
    name: Resolve CI Config
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.config.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: config
        run: python3 ci/export_ci_config.py --github-output "$GITHUB_OUTPUT"
  component:
    needs: resolve-config
    name: ${{ matrix.job_name }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.resolve-config.outputs.matrix) }}
    uses: ovx-labs/ov-ci/.github/workflows/reusable-component-ci.yml@main
    with:
      component: ov-gfx-plugin
      job-name: ${{ matrix.job_name }}
      runs-on: ${{ matrix.runs_on }}
      openvino-repo: ${{ matrix.openvino_repo }}
      openvino-ref: ${{ matrix.openvino_ref }}
      openvino-submodules: ${{ matrix.openvino_submodules }}
      android-ndk-version: ${{ matrix.android_ndk_version }}
      android-sdk-packages: ${{ matrix.android_sdk_packages }}
      dependency-setup-command: ${{ matrix.dependency_setup_command }}
      openvino-ubuntu-packages: ${{ matrix.openvino_ubuntu_packages }}
      openvino-cmake-args: ${{ matrix.openvino_cmake_args }}
      submodules: ${{ matrix.submodules }}
      validation-command: ${{ matrix.validation_command }}
      build-command: ${{ matrix.build_command }}
      test-command: ${{ matrix.test_command }}
