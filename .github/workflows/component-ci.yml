name: component-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ov-gfx-plugin-component-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  component:
    name: ${{ matrix.job_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-rpi-aarch64
            job_name: GFX | Linux RPi AArch64
            runs_on: ubuntu-latest
            openvino_ubuntu_packages: >-
              build-essential
              ninja-build
              ccache
              pkgconf
              git
              python3-pip
              python3-venv
              python3-setuptools
              libpython3-dev
              pybind11-dev
              libffi-dev
            dependency_setup_command: >-
              python3 ci/prepare_rpi_toolchain.py --github-env "$GITHUB_ENV"
            openvino_cmake_args: >-
              -DCMAKE_TOOLCHAIN_FILE=${GFX_RPI_TOOLCHAIN_FILE}
              -DTHREADING=SEQ
              -DENABLE_INTEL_CPU=OFF
              -DENABLE_INTEL_GPU=OFF
              -DENABLE_INTEL_NPU=OFF
              -DENABLE_PYTHON=OFF
              -DENABLE_JS=OFF
              -DENABLE_SAMPLES=OFF
              -DENABLE_TESTS=OFF
              -DENABLE_OV_ONNX_FRONTEND=OFF
              -DENABLE_OV_PADDLE_FRONTEND=OFF
              -DENABLE_OV_TF_FRONTEND=OFF
              -DENABLE_OV_TF_LITE_FRONTEND=OFF
            build_command: >-
              python3 ci/build_standalone.py
              --target-platform rpi
          - name: macos
            job_name: GFX | macOS arm64
            runs_on: macos-14
            openvino_ubuntu_packages: ""
            dependency_setup_command: ""
            openvino_cmake_args: >-
              -DENABLE_INTEL_CPU=OFF
              -DENABLE_INTEL_GPU=OFF
              -DENABLE_INTEL_NPU=OFF
              -DENABLE_PYTHON=OFF
              -DENABLE_JS=OFF
              -DENABLE_SAMPLES=OFF
              -DENABLE_TESTS=OFF
              -DENABLE_OV_ONNX_FRONTEND=OFF
              -DENABLE_OV_PADDLE_FRONTEND=OFF
              -DENABLE_OV_TF_FRONTEND=OFF
              -DENABLE_OV_TF_LITE_FRONTEND=OFF
            build_command: python3 ci/build_standalone.py
          - name: android-arm64
            job_name: GFX | Android arm64
            runs_on: ubuntu-latest
            android_ndk_version: 28.2.13676358
            android_sdk_packages: >-
              platform-tools
              platforms;android-35
            openvino_ubuntu_packages: >-
              build-essential
              ninja-build
              ccache
              pkgconf
              git
              libpython3-dev
              python3-pip
              python3-venv
              python3-setuptools
              unzip
            dependency_setup_command: ""
            openvino_cmake_args: >-
              -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK_ROOT}/build/cmake/android.toolchain.cmake
              -DANDROID_ABI=arm64-v8a
              -DANDROID_PLATFORM=35
              -DANDROID_STL=c++_shared
              -DTHREADING=SEQ
              -DENABLE_INTEL_CPU=OFF
              -DENABLE_INTEL_GPU=OFF
              -DENABLE_INTEL_NPU=OFF
              -DENABLE_PYTHON=OFF
              -DENABLE_JS=OFF
              -DENABLE_SAMPLES=OFF
              -DENABLE_TESTS=OFF
              -DENABLE_OV_ONNX_FRONTEND=OFF
              -DENABLE_OV_PADDLE_FRONTEND=OFF
              -DENABLE_OV_TF_FRONTEND=OFF
              -DENABLE_OV_TF_LITE_FRONTEND=OFF
            build_command: >-
              python3 ci/build_standalone.py
              --target-platform android
              --android-abi arm64-v8a
              --android-platform 35
              --android-stl c++_shared
    uses: ovx-labs/ov-ci/.github/workflows/reusable-component-ci.yml@main
    with:
      component: ov-gfx-plugin
      job-name: ${{ matrix.job_name }}
      runs-on: ${{ matrix.runs_on }}
      openvino-repo: ovx-labs/openvino
      openvino-ref: master
      openvino-submodules: recursive
      android-ndk-version: ${{ matrix.android_ndk_version || '' }}
      android-sdk-packages: ${{ matrix.android_sdk_packages || '' }}
      dependency-setup-command: ${{ matrix.dependency_setup_command || '' }}
      openvino-ubuntu-packages: ${{ matrix.openvino_ubuntu_packages }}
      openvino-cmake-args: ${{ matrix.openvino_cmake_args }}
      submodules: recursive
      validation-command: python3 ci/validate_repo.py
      build-command: ${{ matrix.build_command }}
      test-command: python3 ci/validate_artifacts.py
